<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CDN HTML Loader</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    #status {
      font-size: 1.5rem;
    }
    a {
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>

  <script>
    // 🔗 Replace this with your CDN HTML URL
    const CDN_URL =
      "https://cdn.jsdelivr.net/gh/numerousbeast/ugworldx-assets@main/movie.html";

    async function loadCDNPage(url) {
      try {
        const response = await fetch(url + "?t=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("Failed to fetch: " + response.status);
        }

        const htmlText = await response.text();

        // Parse the fetched HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlText, "text/html");

        // Replace the entire document
        document.open();
        document.write(doc.documentElement.outerHTML);
        document.close();

        // Re-run scripts so they execute
        const scripts = document.querySelectorAll("script");
        scripts.forEach(oldScript => {
          const newScript = document.createElement("script");

          // Copy attributes
          for (const attr of oldScript.attributes) {
            newScript.setAttribute(attr.name, attr.value);
          }

          if (oldScript.src) {
            // Resolve relative paths
            newScript.src = new URL(oldScript.src, url).href;
          } else {
            newScript.textContent = oldScript.textContent;
          }

          oldScript.replaceWith(newScript);
        });

      } catch (error) {
        document.body.innerHTML = `
          <div style="padding: 20px;">
            <h2>Failed to Load Page</h2>
            <p>${error.message}</p>
            <p>
              <a href="${url}" target="_blank">
                Open the page in a new tab
              </a>
            </p>
          </div>
        `;
        console.error(error);
      }
    }

    // Load the CDN page
    loadCDNPage(CDN_URL);
  </script>
</body>
</html>
